<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo artículo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="tituloForm">AÑADIR ARTÍCULO</h1>

    <div class="formulario">
        <input type="hidden" id="id">

        <input type="text" id="nombre" placeholder="Nombre">
        <input type="file" id="imagenArchivo" accept="image/*">

        <img id="preview" style="width:200px; border-radius:10px; display:none; margin-bottom:15px;">

        <input type="number" id="stock" placeholder="Stock">

        <button id="btnGuardar">Guardar</button>
        <button onclick="window.location.href='index.html'">Cancelar</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
